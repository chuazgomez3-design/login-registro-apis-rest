<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login y Registro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>

<main>

<div class="contenedor__todo">

    <div class="caja__trasera">
        <div class="caja__trasera-login">
            <h3>¿Ya tienes una cuenta?</h3>
            <p>Inicia sesión para entrar en la página</p>
            <button type="button" id="btn__iniciar-sesion">Iniciar Sesión</button>
        </div>

        <div class="caja__trasera-register">
            <h3>¿Aún no tienes una cuenta?</h3>
            <p>Regístrate para que puedas iniciar sesión</p>
            <button type="button" id="btn__registrarse">Registrarse</button>
        </div>
    </div>

    <div class="contenedor__login-register">

        <!-- LOGIN -->
        <form class="formulario__login" onsubmit="login(event)">
            <h2>Iniciar Sesión</h2>
            <input type="text" placeholder="Email o Usuario" id="login_email" required>
            <input type="password" placeholder="Password" id="login_password" required>
            <button type="submit">Acceder</button>
        </form>

        <!-- REGISTER -->
        <form class="formulario__register" onsubmit="register(event)">
            <h2>Registrarme</h2>
            <input type="text" placeholder="Usuario" id="reg_usuario" required>
            <input type="email" placeholder="Email" id="reg_email" required>
            <input type="password" placeholder="Password" id="reg_password" required>
            <button type="submit">Registrarme</button>
        </form>

    </div>
</div>

</main>

<!-- CARGA ORDENADA -->
<script src="/static/js/script.js" defer></script>
<script src="/static/js/auth.js" defer></script>

</body>
</html>
